services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poetry-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./poetry.db:/app/poetry.db
    ports:
      - "8000:8000"

  bot:
    build:
      context: .
      dockerfile: bot.Dockerfile
    container_name: poetry-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - BACKEND_PUBLIC_URL=http://backend:8000
    volumes:
      - ./app:/app/app
      - ./bot:/app/bot
    depends_on:
      - backend
